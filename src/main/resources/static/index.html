<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusChat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ─── Login Screen ─── -->
<div id="login-screen" class="screen active">
    <div class="login-container">
        <div class="login-glow"></div>
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="20" stroke="url(#grad)" stroke-width="3"/>
                        <path d="M16 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="18" cy="28" r="2.5" fill="#6c63ff"/>
                        <circle cx="24" cy="30" r="2.5" fill="#00d4aa"/>
                        <circle cx="30" cy="28" r="2.5" fill="#ff6b9d"/>
                        <defs>
                            <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#6c63ff"/>
                                <stop offset="100%" stop-color="#00d4aa"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>NexusChat</h1>
                <p class="tagline">Real-time. Concurrent. Beautiful.</p>
            </div>
            <div id="login-error" class="error-msg hidden"></div>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Choose a username" maxlength="20" autocomplete="off" spellcheck="false">
                <button id="login-btn" class="btn-primary">
                    <span>Enter Chat</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
            <div class="login-features">
                <div class="feature"><span class="dot dot-purple"></span>Multi-room support</div>
                <div class="feature"><span class="dot dot-green"></span>Producer-consumer architecture</div>
                <div class="feature"><span class="dot dot-pink"></span>Thread-safe concurrency</div>
            </div>
        </div>
    </div>
</div>

<!-- ─── Chat Screen ─── -->
<div id="chat-screen" class="screen">
    <div class="chat-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-dot"></div>
                    <span>NexusChat</span>
                </div>
                <div class="user-badge" id="user-badge">
                    <span class="user-avatar" id="user-avatar"></span>
                    <span id="user-display"></span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">
                    <span>Rooms</span>
                    <button id="create-room-btn" class="icon-btn" title="Create / Join Room">+</button>
                </div>
                <div id="room-list" class="room-list">
                    <div class="empty-state">No rooms yet. Create one!</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title"><span>Online</span><span id="user-count" class="badge">0</span></div>
                <div id="user-list" class="user-list"></div>
            </div>

            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-ghost">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                    Disconnect
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- No Room Selected State -->
            <div id="no-room" class="no-room">
                <div class="no-room-content">
                    <svg viewBox="0 0 80 80" fill="none" width="80" height="80">
                        <circle cx="40" cy="40" r="35" stroke="#1e2140" stroke-width="2"/>
                        <path d="M28 35c0-6.6 5.4-12 12-12s12 5.4 12 12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                        <circle cx="30" cy="45" r="3" fill="#6c63ff" opacity="0.4"/>
                        <circle cx="40" cy="48" r="3" fill="#00d4aa" opacity="0.4"/>
                        <circle cx="50" cy="45" r="3" fill="#ff6b9d" opacity="0.4"/>
                    </svg>
                    <h2>Welcome to NexusChat</h2>
                    <p>Join or create a room to start chatting</p>
                </div>
            </div>

            <!-- Active Chat -->
            <div id="active-chat" class="active-chat hidden">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <span class="room-hash">#</span>
                        <span id="current-room-name">general</span>
                    </div>
                    <button id="leave-room-btn" class="btn-ghost btn-sm">Leave Room</button>
                </div>
                <div id="messages" class="messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" spellcheck="false">
                    <button id="send-btn" class="btn-send" title="Send">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Join Room Modal -->
<div id="room-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
        <h3>Join or Create Room</h3>
        <input type="text" id="room-name-input" placeholder="Room name" maxlength="30" autocomplete="off" spellcheck="false">
        <div class="modal-actions">
            <button id="modal-cancel" class="btn-ghost">Cancel</button>
            <button id="modal-join" class="btn-primary btn-sm">Join Room</button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
